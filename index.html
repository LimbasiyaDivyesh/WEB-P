<body>
<div id="root">
</div>

<div id="splash-screen"
     style="position: fixed; inset: 0; background: white; display: flex; align-items: center; justify-content: center; z-index: 9999; background: #f3f4f6;">
    <img style="border-radius: 16px; width: 150px;" src="/192.png" alt="SnS Dairy"/>
</div>

<style>

    html, body {
        overscroll-behavior-y: contain;
        touch-action: pan-y;
    }

    body {
        overscroll-behavior-y: none;
        touch-action: pan-y;
    }

    .main-loader {
        width: 20px;
        aspect-ratio: 1;
        border-radius: 50%;
        background: #000;
        box-shadow: 0 0 0 0 #0004;
        animation: l2 1.5s infinite linear;
        position: relative;

    }
    .main-loader:before,
    .main-loader:after {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: inherit;
        box-shadow: 0 0 0 0 #0004;
        animation: inherit;
        animation-delay: -0.5s;
    }
    .main-loader:after {
        animation-delay: -1s;
    }
    @keyframes l2 {
        100% {box-shadow: 0 0 0 40px #0000}
    }

    .app-loader {
        position: fixed;
        inset: 0;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        background: #f3f4f6;
    }
</style>

</body>
</html>
